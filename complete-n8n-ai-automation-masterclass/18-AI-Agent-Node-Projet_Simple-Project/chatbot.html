<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat · n8n</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:         #f7f6f3;
      --surface:    #ffffff;
      --border:     #e8e5df;
      --text:       #1a1916;
      --muted:      #8a8780;
      --accent:     #2563eb;
      --accent-dim: #dbeafe;
      --user-bg:    #1a1916;
      --user-text:  #f7f6f3;
      --bot-bg:     #ffffff;
      --bot-text:   #1a1916;
      --radius:     14px;
      --shadow:     0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
      --font:       'DM Sans', sans-serif;
      --mono:       'DM Mono', monospace;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    /* ── Shell ─────────────────────────────────────────────── */
    .chat-shell {
      width: 100%;
      max-width: 680px;
      height: min(82vh, 780px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 1.4);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────── */
    .chat-header {
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .chat-header .avatar svg { width: 16px; height: 16px; color: #fff; }
    .chat-header .meta { flex: 1; }
    .chat-header .meta h1 {
      font-size: .875rem;
      font-weight: 500;
      letter-spacing: -.01em;
    }
    .status-dot {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .75rem; color: var(--muted);
    }
    .status-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    .webhook-url {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .15rem .5rem;
      cursor: pointer;
      transition: border-color .15s;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .webhook-url:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Messages ──────────────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Bubble ────────────────────────────────────────────── */
    .bubble-row {
      display: flex;
      gap: .6rem;
      animation: slideUp .2s ease both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .bubble-row .bubble-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: grid; place-items: center;
      flex-shrink: 0;
      align-self: flex-end;
      font-size: .65rem;
      color: var(--muted);
      font-weight: 500;
    }
    .bubble-row.user .bubble-avatar {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .bubble {
      max-width: 75%;
      padding: .65rem .9rem;
      border-radius: var(--radius);
      font-size: .875rem;
      line-height: 1.55;
      word-break: break-word;
    }
    .bubble-row.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble-row.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }

    /* ── Typing indicator ──────────────────────────────────── */
    .typing-indicator {
      display: none;
      gap: .6rem;
      align-items: flex-end;
      animation: slideUp .2s ease both;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: .7rem .9rem;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }
    .typing-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: grid; place-items: center;
      flex-shrink: 0;
      font-size: .65rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Error bubble ──────────────────────────────────────── */
    .bubble.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    /* ── Input bar ─────────────────────────────────────────── */
    .chat-footer {
      padding: .9rem 1.4rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: .6rem;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 1.2);
      padding: .5rem .5rem .5rem .9rem;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: var(--font);
      font-size: .875rem;
      line-height: 1.5;
      color: var(--text);
      max-height: 120px;
      outline: none;
      padding: .2rem 0;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      flex-shrink: 0;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background .15s, transform .1s;
    }
    .send-btn:hover:not(:disabled) { background: #1d4ed8; }
    .send-btn:active:not(:disabled) { transform: scale(.93); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .footer-meta {
      font-size: .7rem;
      color: var(--muted);
      text-align: center;
      margin-top: .5rem;
    }

    /* ── Config overlay ────────────────────────────────────── */
    .config-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }
    .config-overlay.open { display: flex; }
    .config-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 1.4);
      padding: 1.5rem;
      width: 100%; max-width: 400px;
      box-shadow: var(--shadow);
    }
    .config-box h2 { font-size: .95rem; font-weight: 500; margin-bottom: 1rem; }
    .config-box label { font-size: .8rem; color: var(--muted); display: block; margin-bottom: .35rem; }
    .config-box input {
      width: 100%;
      font-family: var(--mono);
      font-size: .8rem;
      padding: .55rem .75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }
    .config-box input:focus { border-color: var(--accent); }
    .config-actions { display: flex; gap: .5rem; justify-content: flex-end; }
    .btn-secondary {
      padding: .45rem .9rem;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      font-family: var(--font);
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: var(--bg); }
    .btn-primary {
      padding: .45rem .9rem;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-family: var(--font);
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: #1d4ed8; }
  </style>
</head>
<body>

<!-- ── Config overlay ────────────────────────────────────────── -->
<div class="config-overlay" id="configOverlay">
  <div class="config-box">
    <h2>Configuration du webhook</h2>
    <label for="webhookInput">URL du webhook n8n</label>
    <input type="url" id="webhookInput" placeholder="https://your-n8n.example.com/webhook/xxx" />
    <div class="config-actions">
      <button class="btn-secondary" id="cancelConfig">Annuler</button>
      <button class="btn-primary" id="saveConfig">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ── Chat shell ─────────────────────────────────────────────── -->
<div class="chat-shell">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><circle cx="19" cy="5" r="3" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="meta">
      <h1>Agent IA</h1>
      <span class="status-dot">connecté</span>
    </div>
    <div class="webhook-url" id="webhookDisplay" title="Cliquer pour modifier">non configuré</div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <!-- Welcome -->
    <div class="bubble-row bot">
      <div class="bubble-avatar">AI</div>
      <div class="bubble">Bonjour 👋 Comment puis-je vous aider ?</div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-avatar">AI</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Footer / Input -->
  <div class="chat-footer">
    <div class="input-row">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Votre message…"
        aria-label="Message"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled aria-label="Envoyer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="footer-meta">Propulsé par n8n · <span id="footerWebhook">configurez votre webhook ↑</span></p>
  </div>
</div>

<script>
  /* ── Config ────────────────────────────────────────────────── */
  const STORAGE_KEY = 'n8n_webhook_url';
  const PAYLOAD_KEY = 'chatInput';   // clé envoyée au webhook
  const RESPONSE_KEY = 'output';     // clé lue dans la réponse

  /* ── State ─────────────────────────────────────────────────── */
  let webhookUrl = localStorage.getItem(STORAGE_KEY) || '';
  let isLoading = false;

  /* ── DOM refs ──────────────────────────────────────────────── */
  const messagesEl      = document.getElementById('messages');
  const inputEl         = document.getElementById('userInput');
  const sendBtn         = document.getElementById('sendBtn');
  const typingIndicator = document.getElementById('typingIndicator');
  const webhookDisplay  = document.getElementById('webhookDisplay');
  const configOverlay   = document.getElementById('configOverlay');
  const webhookInput    = document.getElementById('webhookInput');
  const saveConfigBtn   = document.getElementById('saveConfig');
  const cancelConfigBtn = document.getElementById('cancelConfig');
  const footerWebhook   = document.getElementById('footerWebhook');

  /* ── Init ──────────────────────────────────────────────────── */
  function init() {
    applyWebhook(webhookUrl);
    if (!webhookUrl) openConfig();
  }

  function applyWebhook(url) {
    webhookUrl = url;
    if (url) {
      const short = url.replace(/^https?:\/\//, '').slice(0, 34) + (url.length > 34 ? '…' : '');
      webhookDisplay.textContent = short;
      footerWebhook.textContent  = short;
    } else {
      webhookDisplay.textContent = 'non configuré';
      footerWebhook.textContent  = 'configurez votre webhook ↑';
    }
    updateSendBtn();
  }

  /* ── Config overlay ────────────────────────────────────────── */
  function openConfig() {
    webhookInput.value = webhookUrl;
    configOverlay.classList.add('open');
    webhookInput.focus();
  }
  function closeConfig() { configOverlay.classList.remove('open'); }

  webhookDisplay.addEventListener('click', openConfig);
  cancelConfigBtn.addEventListener('click', closeConfig);
  saveConfigBtn.addEventListener('click', () => {
    const url = webhookInput.value.trim();
    if (url) {
      localStorage.setItem(STORAGE_KEY, url);
      applyWebhook(url);
    }
    closeConfig();
  });
  configOverlay.addEventListener('click', e => {
    if (e.target === configOverlay) closeConfig();
  });

  /* ── Textarea auto-resize ──────────────────────────────────── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
    updateSendBtn();
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading && webhookUrl && inputEl.value.trim()) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function updateSendBtn() {
    sendBtn.disabled = isLoading || !webhookUrl || !inputEl.value.trim();
  }

  /* ── Messages ──────────────────────────────────────────────── */
  function addBubble(text, role = 'bot', isError = false) {
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'bubble-avatar';
    avatar.textContent = role === 'user' ? 'Moi' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = `bubble${isError ? ' error' : ''}`;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);

    // Insert before typing indicator
    messagesEl.insertBefore(row, typingIndicator);
    scrollToBottom();
    return bubble;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(state) {
    isLoading = state;
    typingIndicator.classList.toggle('visible', state);
    if (state) scrollToBottom();
    updateSendBtn();
  }

  /* ── Send ──────────────────────────────────────────────────── */
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !webhookUrl || isLoading) return;

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    updateSendBtn();

    addBubble(text, 'user');
    setLoading(true);

    try {
      const response = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [PAYLOAD_KEY]: text })
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status} — ${response.statusText}`);
      }

      const data = await response.json();

      // Supporte tableau ou objet direct
      const payload = Array.isArray(data) ? data[0] : data;
      const reply   = payload?.[RESPONSE_KEY] ?? payload?.message ?? payload?.text;

      if (!reply) throw new Error('Réponse vide ou champ introuvable.');

      addBubble(reply, 'bot');

    } catch (err) {
      addBubble(`Erreur : ${err.message}`, 'bot', true);
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  /* ── Start ─────────────────────────────────────────────────── */
  init();
</script>
</body>
</html>
